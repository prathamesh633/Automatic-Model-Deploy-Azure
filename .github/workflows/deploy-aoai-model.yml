name: Deploy Azure OpenAI model

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: Approved model to deploy
        required: true
        type: choice
        options:
          - gpt-4o
          - gpt-4o-mini
          - gpt-4
          - gpt-4-32k
          - gpt-4-turbo
          - gpt-35-turbo
          - gpt-35-turbo-16k
          - text-embedding-3-small
          - text-embedding-3-large
          - text-embedding-ada-002
          - dall-e-3
          - whisper
      model_version:
        description: Leave blank to use the default approved version
        required: false
        type: string
        default: ""
      deployment_name:
        description: Deployment name used in Azure OpenAI
        required: true
        type: string
      capacity_tpm:
        description: Capacity in thousands of TPM
        required: true
        type: choice
        options:
          - "10"
          - "20"
          - "30"
          - "50"
          - "80"
          - "100"
          - "120"
      scale_type:
        description: Deployment scale type
        required: true
        type: choice
        options:
          - Standard
          - GlobalStandard
          - ProvisionedManaged
        default: Standard
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - development
          - staging
          - production
        default: development

permissions:
  contents: read
  id-token: write

env:
  GPT_4O_VERSION: "2024-11-20"
  GPT_4O_MINI_VERSION: "2024-07-18"
  GPT_4_VERSION: "turbo-2024-04-09"
  GPT_4_32K_VERSION: "0613"
  GPT_4_TURBO_VERSION: "2024-04-09"
  GPT_35_TURBO_VERSION: "0125"
  GPT_35_TURBO_16K_VERSION: "0613"
  TEXT_EMBEDDING_3_SMALL_VERSION: "1"
  TEXT_EMBEDDING_3_LARGE_VERSION: "1"
  TEXT_EMBEDDING_ADA_002_VERSION: "2"
  DALL_E_3_VERSION: "3.0"
  WHISPER_VERSION: "001"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      resolved_version: ${{ steps.prepare.outputs.resolved_version }}
      resource_group: ${{ steps.prepare.outputs.resource_group }}
      aoai_resource_name: ${{ steps.prepare.outputs.aoai_resource_name }}

    steps:
      - name: Validate inputs
        id: prepare
        run: |
          set -euo pipefail

          deployment_name="${{ inputs.deployment_name }}"
          model_name="${{ inputs.model_name }}"
          model_version="${{ inputs.model_version }}"

          if [[ ! "$deployment_name" =~ ^[a-zA-Z0-9]([a-zA-Z0-9-]{0,62}[a-zA-Z0-9])?$ ]]; then
            echo "::error::Deployment name must be 1-64 characters, alphanumeric or hyphen, and cannot start or end with a hyphen."
            exit 1
          fi

          if [[ -z "$model_version" ]]; then
            case "$model_name" in
              gpt-4o) model_version="${GPT_4O_VERSION}" ;;
              gpt-4o-mini) model_version="${GPT_4O_MINI_VERSION}" ;;
              gpt-4) model_version="${GPT_4_VERSION}" ;;
              gpt-4-32k) model_version="${GPT_4_32K_VERSION}" ;;
              gpt-4-turbo) model_version="${GPT_4_TURBO_VERSION}" ;;
              gpt-35-turbo) model_version="${GPT_35_TURBO_VERSION}" ;;
              gpt-35-turbo-16k) model_version="${GPT_35_TURBO_16K_VERSION}" ;;
              text-embedding-3-small) model_version="${TEXT_EMBEDDING_3_SMALL_VERSION}" ;;
              text-embedding-3-large) model_version="${TEXT_EMBEDDING_3_LARGE_VERSION}" ;;
              text-embedding-ada-002) model_version="${TEXT_EMBEDDING_ADA_002_VERSION}" ;;
              dall-e-3) model_version="${DALL_E_3_VERSION}" ;;
              whisper) model_version="${WHISPER_VERSION}" ;;
              *)
                echo "::error::No default version configured for '$model_name'."
                exit 1
                ;;
            esac
          fi

          case "${{ inputs.environment }}" in
            development)
              resource_group="${{ secrets.DEV_RESOURCE_GROUP }}"
              aoai_resource_name="${{ secrets.DEV_AOAI_RESOURCE_NAME }}"
              ;;
            staging)
              resource_group="${{ secrets.STG_RESOURCE_GROUP }}"
              aoai_resource_name="${{ secrets.STG_AOAI_RESOURCE_NAME }}"
              ;;
            production)
              resource_group="${{ secrets.PROD_RESOURCE_GROUP }}"
              aoai_resource_name="${{ secrets.PROD_AOAI_RESOURCE_NAME }}"
              ;;
            *)
              echo "::error::Unsupported environment '${{ inputs.environment }}'."
              exit 1
              ;;
          esac

          if [[ -z "$resource_group" || -z "$aoai_resource_name" ]]; then
            echo "::error::Missing Azure OpenAI configuration for '${{ inputs.environment }}'."
            exit 1
          fi

          echo "resolved_version=$model_version" >> "$GITHUB_OUTPUT"
          echo "resource_group=$resource_group" >> "$GITHUB_OUTPUT"
          echo "aoai_resource_name=$aoai_resource_name" >> "$GITHUB_OUTPUT"

          echo "Model: $model_name"
          echo "Version: $model_version"
          echo "Deployment: $deployment_name"
          echo "Environment: ${{ inputs.environment }}"

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    environment: aoai-${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy model
        run: bash .github/scripts/deploy_aoai_model.sh
        env:
          RESOURCE_GROUP: ${{ needs.prepare.outputs.resource_group }}
          AOAI_RESOURCE_NAME: ${{ needs.prepare.outputs.aoai_resource_name }}
          MODEL_NAME: ${{ inputs.model_name }}
          MODEL_VERSION: ${{ needs.prepare.outputs.resolved_version }}
          DEPLOYMENT_NAME: ${{ inputs.deployment_name }}
          CAPACITY_TPM: ${{ inputs.capacity_tpm }}
          SCALE_TYPE: ${{ inputs.scale_type }}

      - name: Wait for deployment
        run: |
          set -euo pipefail

          timeout=300
          interval=15
          elapsed=0

          while (( elapsed < timeout )); do
            status=$(az cognitiveservices account deployment show \
              --resource-group "${{ needs.prepare.outputs.resource_group }}" \
              --name "${{ needs.prepare.outputs.aoai_resource_name }}" \
              --deployment-name "${{ inputs.deployment_name }}" \
              --query properties.provisioningState \
              -o tsv 2>/dev/null || echo "Unknown")

            echo "Status: $status"

            case "$status" in
              Succeeded)
                exit 0
                ;;
              Failed|Canceled)
                echo "::error::Deployment finished with status '$status'."
                exit 1
                ;;
            esac

            sleep "$interval"
            elapsed=$((elapsed + interval))
          done

          echo "::error::Timed out waiting for deployment."
          exit 1

      - name: Show deployment
        if: success()
        run: |
          az cognitiveservices account deployment show \
            --resource-group "${{ needs.prepare.outputs.resource_group }}" \
            --name "${{ needs.prepare.outputs.aoai_resource_name }}" \
            --deployment-name "${{ inputs.deployment_name }}" \
            --output table

      - name: Logout
        if: always()
        run: az logout
