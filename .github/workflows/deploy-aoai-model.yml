---
name: Manage Azure OpenAI deployments

"on":
  workflow_dispatch:
    # Inputs shown in the GitHub Actions "Run workflow" form.
    # The workflow uses these values to decide whether to deploy or delete,
    # which environment config to load, and whether any deploy settings
    # should be overridden.
    inputs:
      action:
        description: Choose whether to deploy or delete a model deployment
        required: true
        type: choice
        options:
          - deploy
          - delete
      environment:
        description: Choose the target environment
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      model_name:
        description: Approved model to deploy. Ignored for delete.
        required: false
        type: choice
        options:
          - gpt-4o
          - gpt-4o-mini
          - gpt-4
          - gpt-4-32k
          - gpt-4-turbo
          - gpt-35-turbo
          - gpt-35-turbo-16k
          - text-embedding-3-small
          - text-embedding-3-large
          - text-embedding-ada-002
          - dall-e-3
          - whisper
      deployment_name:
        description: Deployment name to create or delete
        required: true
        type: string
      capacity_tpm_override:
        description: Capacity TPM override in thousands (optional)
        required: false
        type: string
        default: ""
      scale_type_override:
        description: Scale type override (optional)
        required: false
        type: choice
        options:
          - ""
          - Standard
          - GlobalStandard
          - ProvisionedManaged
      confirm_delete:
        description: Required only for delete
        required: true
        type: choice
        options:
          - "no"
          - "yes"

permissions:
  contents: read
  id-token: write

jobs:
  # Resolves the selected environment config, validates the inputs,
  # and prepares the values that the deploy/delete jobs will use.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.prepare.outputs.action }}
      github_environment: ${{ steps.prepare.outputs.github_environment }}
      subscription_id: ${{ steps.prepare.outputs.subscription_id }}
      resource_group: ${{ steps.prepare.outputs.resource_group }}
      aoai_resource_name: ${{ steps.prepare.outputs.aoai_resource_name }}
      deployment_name: ${{ steps.prepare.outputs.deployment_name }}
      model_name: ${{ steps.prepare.outputs.model_name }}
      model_version: ${{ steps.prepare.outputs.model_version }}
      capacity_tpm: ${{ steps.prepare.outputs.capacity_tpm }}
      scale_type: ${{ steps.prepare.outputs.scale_type }}

    steps:
      # Required so the workflow can read env/<environment>/config.yml
      # from the repo.
      - uses: actions/checkout@v4

      - name: Load environment config
        id: prepare
        env:
          ACTION: ${{ inputs.action }}
          TARGET_ENV: ${{ inputs.environment }}
          CONFIG_FILE: env/${{ inputs.environment }}/config.yml
          MODEL_NAME: ${{ inputs.model_name }}
          DEPLOYMENT_NAME: ${{ inputs.deployment_name }}
          CAPACITY_TPM_OVERRIDE: ${{ inputs.capacity_tpm_override }}
          SCALE_TYPE_OVERRIDE: ${{ inputs.scale_type_override }}
          CONFIRM_DELETE: ${{ inputs.confirm_delete }}
        run: |
          set -euo pipefail

          if [[ ! -f "$CONFIG_FILE" ]]; then
            echo "::error::Missing config file: $CONFIG_FILE"
            exit 1
          fi

          # 1-64 characters, alphanumeric/hyphen, no start/end hyphen.
          pattern='^[a-zA-Z0-9]([a-zA-Z0-9-]{0,62}[a-zA-Z0-9])?$'
          if [[ ! "$DEPLOYMENT_NAME" =~ $pattern ]]; then
            echo "::error::Deployment name must be 1-64 characters," \
              "alphanumeric or hyphen, and cannot start or end with a hyphen."
            exit 1
          fi

          if [[ "$ACTION" == "delete" && "$CONFIRM_DELETE" != "yes" ]]; then
            echo "::error::Set confirm_delete to 'yes' to delete" \
              "an existing deployment."
            exit 1
          fi

          # Install YAML parsing support so the workflow can read the
          # environment config file.
          python3 -m pip install pyyaml

          # Read the selected environment config, validate model choices
          # for deploy,
          # and publish normalized values for later jobs through GITHUB_OUTPUT.
          python3 <<'PY'
          import os
          import sys
          import yaml

          with open(os.environ["CONFIG_FILE"], "r", encoding="utf-8") as handle:
              config = yaml.safe_load(handle)

          action = os.environ["ACTION"]
          target_env = os.environ["TARGET_ENV"]
          model_name = os.environ.get("MODEL_NAME", "")
          deployment_name = os.environ["DEPLOYMENT_NAME"]

          azure = config["azure"]
          outputs = {
              "action": action,
              "github_environment": config["github_environment"],
              "subscription_id": str(azure["subscription_id"]),
              "resource_group": str(azure["resource_group"]),
              "aoai_resource_name": str(azure["aoai_resource_name"]),
              "deployment_name": deployment_name,
              "model_name": "",
              "model_version": "",
              "capacity_tpm": "",
              "scale_type": "",
          }

          summary = [
              "### Azure OpenAI request",
              f"- Action: {action}",
              f"- Environment: {target_env}",
              f"- Subscription: {outputs['subscription_id']}",
              f"- Resource group: {outputs['resource_group']}",
              f"- Azure OpenAI resource: {outputs['aoai_resource_name']}",
              f"- Deployment name: {deployment_name}",
          ]

          if action == "deploy":
              if not model_name:
                  print(
                      "::error::model_name is required when action is deploy."
                  )
                  sys.exit(1)

              approved_models = config["approved_models"]
              if model_name not in approved_models:
                  print(
                      f"::error::Model '{model_name}' is not approved for "
                      f"{target_env}."
                  )
                  sys.exit(1)

              model = approved_models[model_name]
              model_version = str(model["version"])
              capacity_tpm = (
                  os.environ["CAPACITY_TPM_OVERRIDE"]
                  or str(model["capacity_tpm"])
              )
              scale_type = (
                  os.environ["SCALE_TYPE_OVERRIDE"]
                  or str(model["scale_type"])
              )

              if not capacity_tpm.isdigit():
                  print("::error::capacity_tpm must be a whole number.")
                  sys.exit(1)

              allowed_scale_types = {
                  "Standard",
                  "GlobalStandard",
                  "ProvisionedManaged",
              }
              if scale_type not in allowed_scale_types:
                  print(
                      "::error::scale_type must be one of: Standard, "
                      "GlobalStandard, ProvisionedManaged."
                  )
                  sys.exit(1)

              outputs["model_name"] = model_name
              outputs["model_version"] = model_version
              outputs["capacity_tpm"] = capacity_tpm
              outputs["scale_type"] = scale_type

              summary.extend(
                  [
                      f"- Model: {model_name}",
                      f"- Version: {model_version}",
                      f"- Capacity TPM: {capacity_tpm}",
                      f"- Scale type: {scale_type}",
                  ]
              )

          with open(
              os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8"
          ) as handle:
              for key, value in outputs.items():
                  handle.write(f"{key}={value}\n")

          with open(
              os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8"
          ) as handle:
              handle.write("\n".join(summary) + "\n")
          PY

  # Runs only when the requested action is "deploy".
  # Uses the resolved values from the prepare job and creates or updates
  # the deployment in Azure OpenAI.
  deploy:
    needs: prepare
    if: needs.prepare.outputs.action == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.github_environment }}

    steps:
      # Authenticates to Azure using the repo's federated identity /
      # service principal settings.
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ needs.prepare.outputs.subscription_id }}

      - name: Deploy model
        env:
          RG: ${{ needs.prepare.outputs.resource_group }}
          AOAI: ${{ needs.prepare.outputs.aoai_resource_name }}
          DEP: ${{ needs.prepare.outputs.deployment_name }}
          MODEL: ${{ needs.prepare.outputs.model_name }}
          VER: ${{ needs.prepare.outputs.model_version }}
          SCALE: ${{ needs.prepare.outputs.scale_type }}
          CAPACITY: ${{ needs.prepare.outputs.capacity_tpm }}
        run: |
          set -euo pipefail

          # Fail early if the Azure OpenAI resource is missing or still
          # provisioning.
          state=$(az cognitiveservices account show \
            --resource-group "$RG" \
            --name "$AOAI" \
            --query properties.provisioningState \
            -o tsv 2>/dev/null || echo "NotFound")

          if [[ "$state" != "Succeeded" ]]; then
            echo "::error::Azure OpenAI resource '$AOAI'" \
              "is not ready (state: $state)."
            exit 1
          fi

          echo "Deploying $MODEL:$VER to $AOAI as $DEP"

          az cognitiveservices account deployment create \
            --resource-group "$RG" \
            --name "$AOAI" \
            --deployment-name "$DEP" \
            --model-name "$MODEL" \
            --model-version "$VER" \
            --model-format OpenAI \
            --sku-name "$SCALE" \
            --sku-capacity "$CAPACITY"

      - name: Wait for deployment
        env:
          RG: ${{ needs.prepare.outputs.resource_group }}
          AOAI: ${{ needs.prepare.outputs.aoai_resource_name }}
          DEP: ${{ needs.prepare.outputs.deployment_name }}
        run: |
          set -euo pipefail

          # Poll until Azure marks the deployment as ready or returns a
          # terminal failure state.
          timeout=300
          interval=15
          elapsed=0

          while (( elapsed < timeout )); do
            status=$(az cognitiveservices account deployment show \
              --resource-group "$RG" \
              --name "$AOAI" \
              --deployment-name "$DEP" \
              --query properties.provisioningState \
              -o tsv 2>/dev/null || echo "Unknown")

            echo "Status: $status"

            case "$status" in
              Succeeded)
                exit 0
                ;;
              Failed|Canceled)
                echo "::error::Deployment finished with status '$status'."
                exit 1
                ;;
            esac

            sleep "$interval"
            elapsed=$((elapsed + interval))
          done

          echo "::error::Timed out waiting for deployment."
          exit 1

      - name: Show deployment
        if: success()
        env:
          RG: ${{ needs.prepare.outputs.resource_group }}
          AOAI: ${{ needs.prepare.outputs.aoai_resource_name }}
          DEP: ${{ needs.prepare.outputs.deployment_name }}
        run: |
          # Prints the final deployment details for quick verification in
          # the Actions logs.
          az cognitiveservices account deployment show \
            --resource-group "$RG" \
            --name "$AOAI" \
            --deployment-name "$DEP" \
            --output table

      - name: Logout
        if: always()
        run: az logout

  # Runs only when the requested action is "delete".
  # Verifies the deployment exists before attempting deletion, then
  # waits until Azure removes it.
  delete:
    needs: prepare
    if: needs.prepare.outputs.action == 'delete'
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.github_environment }}

    steps:
      # Authenticates to Azure before issuing delete commands.
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ needs.prepare.outputs.subscription_id }}

      - name: Delete deployment
        env:
          RG: ${{ needs.prepare.outputs.resource_group }}
          AOAI: ${{ needs.prepare.outputs.aoai_resource_name }}
          DEP: ${{ needs.prepare.outputs.deployment_name }}
        run: |
          set -euo pipefail

          # Confirm the deployment exists so we can return a clearer error
          # if the name is wrong.
          if ! az cognitiveservices account deployment show \
            --resource-group "$RG" \
            --name "$AOAI" \
            --deployment-name "$DEP" \
            --output none 2>/dev/null; then
            echo "::error::Deployment '$DEP' was not found."
            exit 1
          fi

          echo "Deleting deployment $DEP from $AOAI"

          az cognitiveservices account deployment delete \
            --resource-group "$RG" \
            --name "$AOAI" \
            --deployment-name "$DEP"

      - name: Wait for deletion
        env:
          RG: ${{ needs.prepare.outputs.resource_group }}
          AOAI: ${{ needs.prepare.outputs.aoai_resource_name }}
          DEP: ${{ needs.prepare.outputs.deployment_name }}
        run: |
          set -euo pipefail

          # Poll until the deployment is no longer returned by Azure.
          timeout=300
          interval=15
          elapsed=0

          while (( elapsed < timeout )); do
            if ! az cognitiveservices account deployment show \
              --resource-group "$RG" \
              --name "$AOAI" \
              --deployment-name "$DEP" \
              --output none 2>/dev/null; then
              echo "Deployment deleted."
              exit 0
            fi

            echo "Waiting for deletion..."
            sleep "$interval"
            elapsed=$((elapsed + interval))
          done

          echo "::error::Timed out waiting for deletion."
          exit 1

      - name: Logout
        if: always()
        run: az logout
